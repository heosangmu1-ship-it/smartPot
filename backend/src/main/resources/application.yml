spring:
  application:
    name: smart-garden
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# InfluxDB 3 Core (읽기 전용 — 쓰기는 garden-bridge 가 담당)
influxdb:
  host: ${INFLUXDB_HOST:http://localhost:8181}
  database: garden_sensors
  token: ${INFLUXDB_TOKEN:}

# Redis Pub/Sub 채널
app:
  redis:
    pubsub-channel: sensor:update
    current-key-prefix: "sensor:current:"

security:
  enabled: ${SECURITY_ENABLED:false}
  user: ${SECURITY_USER:admin}
  password: ${SECURITY_PASSWORD:changeme}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    com.garden.smartgarden: DEBUG
